version: "3.8"

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db", "-u", "root", "-p$DATABASE_PASSWORD" ]
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        RAILS_ENV: ${RAILS_ENV}
    platform: linux/x86_64
    command: bundle exec rails s -p 3000 -b "0.0.0.0"
    env_file: .env.prd
    environment:
      STOCK_API_URL: http://stock-api:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/1
    volumes: []
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      stock-api:
        condition: service_started

  sidekiq:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        RAILS_ENV: ${RAILS_ENV}
    platform: linux/x86_64
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env.prd
    environment:
      STOCK_API_URL: http://stock-api:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      stock-api:
        condition: service_started

  stock-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.stock
    platform: linux/x86_64
    expose:
      - "8000"

volumes:
  db_data:
  redis_data:
